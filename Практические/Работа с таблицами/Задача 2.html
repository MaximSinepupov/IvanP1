<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Динамическая таблица 1</title>
<script>
    //
    function add() {
        //
        var nodet = document.createElement('tr');
        //
        var node = document.createElement('td');
        //
        var node1 = document.createElement('td');
        //
        node.innerHTML="<input type='text' name='1'>";
        //
        node1.innerHTML="<input type='text' name='2'>";
        //
        document.getElementById('tabl1').appendChild(nodet);
        //
        nodet.appendChild(node);
        //
        nodet.appendChild(node1);
    }
</script>
</head>
<body>
<!---->
    <table id="tabl1" border="1" align="left">
        <tr>
            <!---->
            <td><input type="text" name="1"></td>
            <td><input type="text" name="2"></td>
        </tr>
    </table>
    <!---->
    <input type="button" value="Добавить строки" onclick="add();">    
</body>
</html>
