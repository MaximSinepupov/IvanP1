<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Операторы циклов</title>
</head>
<body>
    <center>
        <h1>Практическая работа "Использование операторов цикла при составлении сценариев"</h1>
    </center>
    <p>Вывести столбец четных чисел от 0 до 100 используя цикл while</p>
    <script>
        var i=0;
        while (i<=100)
    {
   document.write(i+'<br>');
   i+=2;
    }
    </script>
</body>
</html>
