<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function Car(name,model,color) {
            this.name=name;
            this.model=model;
            this.color=color;
        }
        var myCar=new Car;
        myCar.name="Мерс";
        myCar.model="600";
        myCar.color="green";
        Car.prototype.owner="Иванов";
        alert(myCar.name + " " + myCar.model + " " + myCar.color + " " + myCar.owner);
    </script>
</body>
</html>
