<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>События</title>
</head>
<body>
    <button id="MyElem">Нажми</button>
    <script>
        function message(){
            alert('Ура!');
        }
        var button=document.getElementById("MyElem");
        button.addEventListener("click",message);
        </script>
</body>
</html>
