<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>События</title>
</head>
<body>
    <button onclick="buttonClick()">Нажми на меня</button>
    <input type="text" id="input" value=" ">
    <script>
        function buttonClick(){
            var input=document.getElementById('input');
            alert(input.value);
        }
    </script>
</body>
</html>
