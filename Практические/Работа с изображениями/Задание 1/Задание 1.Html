<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Изменение свойств с изображениями </title>
    <script>
        function changeimg(){
            document.getElementById(myimg).src=document.myform.mysrc.value;
            document.getElementById(myimg).width=document.myform.mywidth.value;
            document.getElementById(myimg).height=document.myform.myheight.value;
        }
    </script>
</head>
<body>
    <form id="myform" name="myform">
        Файл:
    <select id="mysrc" name="mysrc">
     <option value="https://avatars.mds.yandex.net/get-mpic/5332815/img_id2779781155631833833.jpeg/orig"/> Картинка 1
     <option value="https://photocentra.ru/images/main84/843979_main.jpg"/> Картинка 2
     <option value="https://avatars.mds.yandex.net/get-mpic/906397/img_id8789749398047664874.jpeg/orig"/>  Картинака 3
    </select>
    <br>
    <input id="mywidth" name="mywidth" type="text" value="200" size="4">
    <br>
    <input id="myheight" name="myheight" type="text" value="100" size="4">
    <br>
    <input id="applay" name="applay" type="button" value="применить" onclick="changeimg()">
    <input id="cancel" name="cancel" type="button" value="отмена" onclick="document.myform.reset(); changeimg()">
</form>
    <img id="myimg" name="myimg" src="https://avatars.mds.yandex.net/get-mpic/5332815/img_id2779781155631833833.jpeg/orig" alt="Картинка" width="200" height="100">
</body>
</html>
