<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Условные операторы</title>
</head>
<body>
    <script>
        var age=prompt('Сколько Вам лет?',' ');
        age=parseInt(age); //преобразовываем тексиовые данные в число
        if (age>1 && age<18) {
            alert ("Вы слишком молоды");
        }
        else {
            alert ("Вы нам подходите");
        }
    </script>
</body>
</html>
