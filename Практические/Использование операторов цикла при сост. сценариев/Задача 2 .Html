<!DOCTYPE html>
<html lang="en">
<head>

<body>
    <center> <h1> Практическая работа  " Использование операторов цикла при составлении сценариев"</h1>
    <p> Введите столбец четных числе в промежутке от 0 до 100</p> </center>
    <script>
    //описание переменных
    var i=0;
   
        while (i<=100)
        {
    document.write(i+"<br>" );
    i+=2;
    }    
    
</script>
</body>
