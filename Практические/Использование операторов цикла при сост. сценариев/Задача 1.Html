<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <center> <h1> Практическая работа  " Использование операторов цикла при составлении сценариев"</h1>
    <p> Выполнить табулирование функции y=x*x+5*x</p>
    </center>
    <script>
        // описание переменных
        var x;
        var y;
        for ( x=-5;x<=10;x+=2){
            y=x*x+5*x;
            document.write('x='+x+'y='+y +"<br>");
        }
    </script>
</body>
</html>
