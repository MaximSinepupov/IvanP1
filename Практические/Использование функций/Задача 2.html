<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Найти большее из двух чисел</h1>
    <br>
    <button onclick="max()">ввести числа </button> <br>
    Большее число <b id="maximal"></b>
    <script>
        function max(a,b) {
            var a = prompt ('введите первое число','')
            var b = prompt ('введите второе число','')
            if (a>b){
                document.getElementById('maximal').innerHTML=a;
            }
                else {
                document.getElementById('maximal').innerHTML=b;
                }
            }

    </script>
</body>
</html>
