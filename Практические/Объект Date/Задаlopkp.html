<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var d=new Date();
        var td=d.getDay();
        document.write('Номер дня недели '+td+ '<br>');
        var days=['вс','пн','вт','ср','чт','пт','сб'];
        document.write('Сегодня '+days[td]);
        </script>
</body>
</html>
