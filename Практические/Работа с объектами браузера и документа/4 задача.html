<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Задача 1</title>
</head>
<body>
   <h1> Работа с окнами </h1> <hr>
   <script>
    var myWindow;
    function myWindowOpen (){
        myWindow = window.open("http://yandex.ru", "myWindow", "top=250 left=250 width=250, height=250");
    }
    function myWindowClose () {
        if (myWindow){
            myWindow.close();
            myWindow=null;
        }
    }
   </script>
   <button onclick="myWindowOpen ()"> Открыть окно</button>
   <button onclick="myWindowClose ()"> Закрыть окно</button>
</body>
</html>
